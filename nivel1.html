<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 1 - Lecciones</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste de tamaño para móviles */
        @media (max-width: 600px) {
            .card-container {
                width: 95% !important; 
                padding: 15px !important;
                font-size: 1.1rem;
            }
            h2 { font-size: 1.5rem; }
        }

        pre {
            background: transparent !important;
            overflow-x: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div id="badge" class="lvl-1" style="display:inline-block; padding:5px 15px; border-radius:10px; font-weight:bold; margin-bottom:10px;">Nivel 1</div>
        <div id="content"></div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="prevBtn" class="btn btn-prev" onclick="cambiar(-1)">Anterior</button>
            <button id="nextBtn" class="btn btn-next" onclick="cambiar(1)">Siguiente</button>
        </div>
    </div>

    <script>
        const datos = [
            { t: "1. ARI ES PENDEJA.", c: "Un lenguaje de programación es el medio fundamental mediante el cual una persona puede comunicarse con la computadora para que esta ejecúte órdenes específicas y cumpla con las tareas requeridas. <p> Lenguajes de programación como Python, Java, C o C++ proporcionan la estructura y la sintaxis necesarias para expresar instrucciones de manera comprensible tanto para los humanos como para las maquinas mediante el uso de compiladores o intérpretes.", e: "Un mismo programa puede escribirse en distintos lenguajes de programación para resolver el mismo problema. " },
            { t: "2. Lenguaje de maquina.", c: "La computadora, específicamente su CPU, solo interpreta señales eléctricas representadas como código binario, es decir, secuencias de 0 y 1. Este sistema se conoce como lenguaje de máquina. Cada instrucción escrita en un lenguaje de programación de alto nivel debe traducirse a este lenguaje binario mediante un compilador o intérprete, para que la CPU pueda ejecutarla.", e:"Las instrucciones en lenguaje de máquina están formadas por códigos de operación y datos."},                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
            { t: "3. ¿Qué es un compilador? ", c: "Un compilador o intérprete son herramientas fundamentales en la programación que actúan como traductores entre el código fuente (las instrucciones escritas por el programador) y el lenguaje de máquina, compuesto por 0 y 1, que el procesador puede ejecutar. <p> Un compilador traduce todo el programa antes de ejecutarlo, mientras que un intérprete analiza y ejecuta el código instrucción por instrucción. Sin estas herramientas, el código escrito por los programadores no sería comprensible para la computadora.", e: "El primer compilador fue desarrollado en 1952 por la científica informática Grace Hopper." },
            { t: "4. ¿Qué es un algoritmo?", c: "Un algoritmo es un conjunto ordenado y finito de pasos que se siguen para resolver un problema o realizar una tarea específica.", e:"Los algoritmos existen desde antes de las computadoras; originalmente se utilizaban para resolver problemas matemáticos."},
            { t: "5. ¿Qué es el lenguaje C?", c: "El lenguaje C es un lenguaje de programación de propósito general ampliamente utilizado para desarrollar sistemas operativos, programas y software de alto rendimiento debido a su eficiencia y control sobre el hardware. <p> El lenguaje C fue creado en 1972 por Dennis Ritchie en los laboratorios Bell.", e:"Muchos lenguajes populares, como C++, Java y C#, están inspirados en el lenguaje C."},
            { t: "6. El primer programa en C", c: "Tradicionalmente, el primer programa que se aprende en cualquier lenguaje de programación es ´Hola, mundo´, ya que permite comprobar que el compilador funciona correctamente y que el programa puede ejecutarse.", e: "#include &lt;stdio.h&gt; <br> int main() { <br> printf(´Hola, mundo´/n); <b> return 0; <br>"},
            ];
        
        let idx = 0;
        function mostrar() {
            const item = datos[idx];
            document.getElementById("content").innerHTML = `<h2>${item.t}</h2><p>${item.c}</p><pre><code>${item.e}</code></pre>`;
            document.getElementById("prevBtn").style.visibility = idx === 0 ? "hidden" : "visible";
            if(idx === datos.length - 1) {
                document.getElementById("nextBtn").innerText = "Ir al Quiz";
                document.getElementById("nextBtn").className = "btn btn-quiz";
            } else {
                document.getElementById("nextBtn").innerText = "Siguiente";
                document.getElementById("nextBtn").className = "btn btn-next";
            }
        }
        function cambiar(n) {
            idx += n;
            if(idx >= datos.length) window.location.href = "quiz-nivel1.html";
            else mostrar();
        }
        mostrar();
    </script>
</body>
</html>
