<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 2 - Tutorial Algoritmos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste de tamaño para móviles */
        @media (max-width: 600px) {
            .card-container {
                width: 95% !important;
                padding: 15px !important;
                font-size: 1.1rem;
            }
            h3 { font-size: 1.4rem; }
        }

        /* Forzamos que el cuadro de código siempre sea visible y estilizado */
        pre {
            background: #f4f4f4 !important; /* Fondo gris claro para resaltar */
            border-left: 5px solid #5d5dff; /* Línea azul igual a tu diseño */
            padding: 15px;
            margin: 20px 0;
            overflow-x: auto; /* Barra de desplazamiento si es necesario */
            width: 100%;
            box-sizing: border-box;
            border-radius: 5px;
        }

        code {
            display: block;
            white-space: pre-wrap; /* Mantiene saltos de línea pero permite ajuste */
            word-wrap: break-word;
            color: #333;
            font-family: 'Courier New', Courier, monospace;
        }

        .card {
            max-width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div id="badge" class="btn lvl-2" style="display:inline-block; margin-bottom:15px; padding: 5px 15px;">Nivel 2</div>
        <div id="content"></div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="prevBtn" class="btn btn-prev" onclick="navegar(-1)">Anterior</button>
            <button id="nextBtn" class="btn btn-next" onclick="navegar(1)">Siguiente</button>
        </div>
    </div>

    <script>
        const lecciones = [
            { t: "1. ¿Qué es una biblioteca en C?", c: "En C, una biblioteca es un archivo que contiene funciones ya creadas que podemos usar en nuestros programas sin tener que escribirlas desde cero. <P> Por ejemplo, la biblioteca &lt;stdio.h&gt; permite usar funciones como printf() para mostrar texto y scanf() para leer datos.", e:"#include &lt;stdio.h&gt; \n\nSe coloca al inicio del programa para que el compilador conozca las funciones que vamos a utilizar."},
            { t: "2. La función principal: int main()", c: "&quot;main()&#34; es la función principal de un programa en C. La ejecución del programa siempre comienza aquí.<br> &quot;int&#34; indica que la función devolverá un número entero al finalizar.", e: "int main() {\n // Tu código aquí\n return 0;\n}" },
            { t: "3. Variables", c: "Una variable es un espacio en la memoria de la computadora donde se guarda un dato que puede cambiar durante la ejecución del programa. <p>Cada variable tiene un tipo de dato, que indica qué tipo de información puede guardar. Los tipos más comunes son:<p>int → números enteros. Ej: int edad = 25; <p>float → Números con decimales. Ej: float altura = 1.75; <p>char para un solo carácter o símbolo. Ej: char grado = 'B';", e: "Ejemplo: Lista de Alumnos\nPara registrar a un estudiante usamos diferentes variables:\n\n1. int edad = 19; \n2. float promedio = 9.75; \n3. char seccion = 'A';\n\nComo ves, cada dato tiene su tipo ideal según lo que necesitemos guardar." },
            { t: "4. Entrada de datos: scanf()", c: "Para pedir datos al usuario utilizamos scanf(). Esta función lee información que el usuario escribe en el teclado. El %d indica que vamos a recibir un entero, y &numero es la dirección de memoria donde guardaremos el dato.", e: "printf(\"Ingresa un número:\");\nscanf(\"%d\", &numero);\n// %d = entero, &numero = dirección de memoria" },
            { t: "5. Condicionales: if - else", c: "Una estructura que permite tomar decisiones según una condición. El if evalúa si una condición es verdadera, else if evalúa otra condición si la primera es falsa, y else ejecuta código si ninguna condición se cumple.", e: "if (numero > 0) {\n printf(\"Positivo\");\n}\nelse if (numero < 0) {\n printf(\"Negativo\");\n} else {\n printf(\"Cero\");\n}" },
            { t: "Finalización del programa: return 0;", c: "Indica al sistema operativo que el programa terminó correctamente y sin errores.", e: "return 0; \n\n//Este valor se envía al sistema operativo para indicar que no hubo errores." },
            { t: "Comentarios en C", c:"Los comentarios se usan para escribir notas dentro del código que el programa no ejecutará.", e:"// Se escriben usando doble barra."},
            { t: "CÓDIGO COMPLETO", c: "Aquí tienes el algoritmo armado con todo lo aprendido:", e: "#include <stdio.h>\n\nint main() {\n int numero;\n printf(\"Ingresa un número: \");\n scanf(\"%d\", &numero);\n\n if (numero > 0) {\n printf(\"El número es positivo.\");\n } else if (numero < 0) {\n printf(\"El número es negativo.\");\n } else {\n printf(\"El número es cero.\");\n }\n\n return 0;\n}"},
        ];

        let i = 0;
        function render() {
            const l = lecciones[i];
            // Renderizado limpio
            document.getElementById("content").innerHTML = `<h3>${l.t}</h3><p>${l.c}</p><pre><code>${l.e}</code></pre>`;
            document.getElementById("prevBtn").style.visibility = i === 0 ? "hidden" : "visible";
            if(i === lecciones.length - 1) {
                document.getElementById("nextBtn").innerText = "Ir al Quiz";
                document.getElementById("nextBtn").className = "btn btn-quiz";
            } else {
                document.getElementById("nextBtn").innerText = "Siguiente";
                document.getElementById("nextBtn").className = "btn btn-next";
            }
        }
        function navegar(dir) {
            i += dir;
            if(i >= lecciones.length) window.location.href = "quiz-nivel2.html";
            else render();
        }
        render();
    </script>
</body>
</html>
