<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 2 - Tutorial Algoritmos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste de tamaño para móviles */
        @media (max-width: 600px) {
            .card-container {
                width: 95% !important; /* Aprovecha más espacio lateral */
                padding: 15px !important;
                font-size: 1.1rem; /* Texto un poco más grande para leer mejor */
            }
            h3 { font-size: 1.4rem; }
        }

        pre {
            background: transparent !important; 
            overflow-x: auto; /* Tu barrita de desplazamiento */
            width: 100%;
            margin: 0;
            padding: 0;
        }

        code {
            display: block;
            width: 100%;
            color: inherit;
        }

        .card {
            max-width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div id="badge" class="btn lvl-2" style="display:inline-block; margin-bottom:15px; padding: 5px 15px;">Nivel 2</div>
        <div id="content"></div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="prevBtn" class="btn btn-prev" onclick="navegar(-1)">Anterior</button>
            <button id="nextBtn" class="btn btn-next" onclick="navegar(1)">Siguiente</button>
        </div>
    </div>

    <script>
        const lecciones = [
            { t: "1. ¿Qué es una biblioteca en C?", c: "En C, una biblioteca es un archivo que contiene funciones ya creadas que podemos usar en nuestros programas sin tener que escribirlas desde cero. <P> Por ejemplo, la biblioteca &lt;stdio.h&gt; permite usar funciones como printf() para mostrar texto y scanf() para leer datos.", e:"#include &lt;stdio.h&gt; <p> Se coloca al inicio del programa para que el compilador conozca las funciones que vamos a utilizar."},
            { t: "2. La función principal: int main()", c: "&quot;main()&#34; es la función principal de un programa en C. La ejecución del programa siempre comienza aquí.<br> &quot;int&#34; indica que la función devolverá un número entero al finalizar.", e: "int main() {\n // Tu código aquí\n return 0;\n}" },
            { t: "3. Variables", c: "Una variable es un espacio en la memoria de la computadora donde se guarda un dato que puede cambiar durante la ejecución del programa. <p>Cada variable tiene un tipo de dato, que indica qué tipo de información puede guardar. Los tipos más comunes son:<p>int → números enteros. Ej: int edad = 25; <p>float → Números con decimales. Ej: float altura = 1.75; <p>char para un solo carácter o símbolo. Ej: char grado = 'B';", e: "<div class='card' style='background:#f4f4f4; border-left:5px solid #5d5dff; padding:15px; margin:20px 0; font-family:sans-serif; color: #333;'><p><strong>Ejemplo: Lista de Alumnos</strong><br>Para registrar a un estudiante usamos diferentes variables:</p><p>1. <b>int</b> edad = 19; <br>2. <b>float</b> promedio = 9.75; <br>3. <b>char</b> seccion = 'A';</p><p>Como ves, cada dato tiene su tipo ideal según lo que necesitemos guardar.</p></div>" },
            { t: "4. Entrada de datos: scanf()", c: "Para pedir datos al usuario utilizamos scanf(). Esta función lee información que el usuario escribe en el teclado. El %d indica que vamos a recibir un entero, y &numero es la dirección de memoria donde guardaremos el dato.", e: "printf(&quot;Ingresa un número:&#34;);<br>scanf(&quot;%d&#34;, &numero);<br>// %d = entero, &numero = dirección de memoria" },
            { t: "5. Condicionales: if - else", c: "Una estructura que permite tomar decisiones según una condición. El if evalúa si una condición es verdadera, else if evalúa otra condición si la primera es falsa, y else ejecuta código si ninguna condición se cumple.", e: "if (numero > 0) {<br> printf(&quot;Positivo&#34;);<br>}<br>else if (numero < 0) {<br> printf(&quot;Negativo&#34;);<br>}else {<br> printf(&quot;Cero&#34;);<br>}" },
            { t: "Finalización del programa: return 0;", c: "Indica al sistema operativo que el programa terminó correctamente y sin errores.", e: "return 0; <p>//Este valor se envía al sistema operativo para indicar que no hubo errores." },
            { t: "Comentarios en C", c:"Los comentarios se usan para escribir notas dentro del código que el programa no ejecutará.", e:"Se escriben usando //."},
            { t: "CÓDIGO COMPLETO", c: "Aquí tienes el algoritmo armado con todo lo aprendido:", e: "#include &lt;stdio.h&gt; //Incluye la librería estándar de entrada y salida. <p>int main() { <br> int numero; //Declaración de una variable entera para almacenar el valor.<p> //Solicita al usuario que ingrese un dato.<br> printf(&quot;Ingresa un número: &#34;); <p> //Lee el número ingresado por teclado y lo guarda en la variable ¨numero¨<br> scanf(&quot;%d&#34;, &numero);<p> //Estructura de control para decidir qué mensaje mostrar<br> if (numero &gt; 0) {<br> //Se ejecuta si el numero es mayor a cero<br> printf(&quot;El número es positivo.&#34;);<br> }<br> else if (numero &lt; 0) {<br> //Se ejecuta si el número es menor a cero<br> printf(&quot;El número es negativo.&#34;);<br> }<br> else {<br> //Se ejecuta si no es ni mayor ni menor a cero (es decir, es cero)<br> printf(&quot;El número es cero.&#34;);<br> }<p> return 0; //Indica que el programa finalizó correctamente<br>}"},
        ];

        let i = 0;
        function render() {
            const l = lecciones[i];
            document.getElementById("content").innerHTML = `<h3>${l.t}</h3><p>${l.c}</p><pre><code>${l.e}</code></pre>`;
            document.getElementById("prevBtn").style.visibility = i === 0 ? "hidden" : "visible";
            if(i === lecciones.length - 1) {
                document.getElementById("nextBtn").innerText = "Ir al Quiz";
                document.getElementById("nextBtn").className = "btn btn-quiz";
            } else {
                document.getElementById("nextBtn").innerText = "Siguiente";
                document.getElementById("nextBtn").className = "btn btn-next";
            }
        }
        function navegar(dir) {
            i += dir;
            if(i >= lecciones.length) window.location.href = "quiz-nivel2.html";
            else render();
        }
        render();
    </script>
</body>
</html>
