<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende C - Inicio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Contenedor principal para los botones superiores */
        .nav-wrapper {
            display: flex;
            justify-content: space-between; /* Uno a cada lado */
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 10px auto;
        }

        .btn-practica {
            background-color: #1A3A5F;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Estilo del botón decorativo de configuración */
        .config-trigger {
            cursor: pointer;
            font-size: 1.1rem;
            color: #1A3A5F;
            padding: 8px;
            transition: 0.3s;
            user-select: none;
        }

        .config-trigger:hover { transform: scale(1.1); }

        /* Barra de ajustes color lavanda solicitado */
        .config-bar {
            display: none;
            background-color: #CCCCFF;
            width: 90%;
            max-width: 450px;
            margin: 0 auto 20px auto;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .btn-toggle {
            background: white;
            border: 2px solid #1A3A5F;
            color: #1A3A5F;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 5px;
        }

        @media (max-width: 600px) {
            .nav-wrapper {
                max-width: 95%;
                padding: 0 10px;
            }
            h1 { font-size: 1.4em !important; }
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <div class="config-trigger" onclick="toggleConfig()">
            ◍✧*⑅ᵕ˖♡◕ 🔧
        </div>
        <a href="practica/practica.html" class="btn-practica">🚀 Modo Práctica</a>
    </div>

    <div id="config-bar" class="config-bar">
        <p style="margin-bottom: 10px; font-weight: bold; color: #1A3A5F; font-size: 0.9em;">Alineación del Texto:</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-toggle" onclick="setAlign('justify')">≡ Justificado</button>
            <button class="btn-toggle" onclick="setAlign('center')">-= Centrado</button>
        </div>
    </div>

    <div class="card-container">
        <h1 style="color:#1A3A5F; font-size: 1.6em;">𓍢 Aprende Programación desde cero 𓍢</h1>
        <p style="color:var(--subtitle); margin-bottom:30px;">
            Tu guía básica para iniciar en programación
        </p>

        <div style="display:flex; flex-direction:column; gap: 12px;">
            <a href="nivel1.html" class="btn lvl-btn lvl-1">Nivel 1: Fundamentos de C</a>
            <a href="nivel2.html" class="btn lvl-btn lvl-2">Nivel 2: Creación de Algoritmos</a>
            <button class="btn lvl-btn lvl-3" disabled>Nivel 3: Estructuras de Datos (Próximamente)</button>
            <button class="btn lvl-btn lvl-4" disabled>Nivel 4: Gestión de Memoria (Próximamente)</button>
            <button class="btn lvl-btn lvl-5" disabled>Nivel 5: Proyectos Finales (Próximamente)</button>
        </div>
    </div>

    <script>
        // Función para mostrar/ocultar la barra lavanda
        function toggleConfig() {
            const bar = document.getElementById('config-bar');
            bar.style.display = (bar.style.display === 'block') ? 'none' : 'block';
        }

        // Función para guardar la preferencia y cerrar el menú
        function setAlign(type) {
            localStorage.setItem('userTextAlign', type);
            console.log("Alineación guardada: " + type); 
            
            // Cerramos la barra automáticamente tras elegir
            toggleConfig(); 
            
            // Opcional: un pequeño aviso visual para confirmar al usuario
            alert("Preferencia guardada: " + (type === 'justify' ? 'Justificado' : 'Centrado'));
        }
    </script>

</body>
</html>
