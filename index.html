    <link rel="stylesheet" href="style.css">
    <style>
        /* Contenedor principal para los botones superiores */
        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 10px auto;
        }

        .btn-practica {
            background-color: #1A3A5F;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* AJUSTE DEL ICONO PARA QUE NO SE VEA LINEAL */
        .config-trigger {
            cursor: pointer;
            font-size: 1.3rem;
            color: #1A3A5F;
            padding: 5px;
            transition: 0.3s;
            user-select: none;
            display: inline-block; /* Fundamental para que los sГ­mbolos no salten */
            line-height: 1; /* Elimina interlineado extra */
            letter-spacing: -1px; /* Junta un poco mГЎs los sГ­mbolos */
        }

        .config-trigger:hover { transform: scale(1.15); }

        /* Barra de ajustes color lavanda */
        .config-bar {
            display: none;
            background-color: #CCCCFF;
            width: 90%;
            max-width: 450px;
            margin: 0 auto 20px auto;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* ESTILO DEL TГЌTULO AESTHETIC CON DEGRADADO */
        h1 {
            font-size: 1.6em;
            background: linear-gradient(135deg, #1A3A5F, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #1A3A5F;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            margin-top: 20px;
            margin-bottom: 5px;
            font-weight: 800;
            text-align: center;
        }

        .btn-toggle {
            background: white;
            border: 2px solid #1A3A5F;
            color: #1A3A5F;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 5px;
        }

        @media (max-width: 600px) {
            .nav-wrapper {
                max-width: 95%;
                padding: 0 10px;
            }
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
    <div class="config-trigger" onclick="toggleConfig()">
        <span class="aesthetic-symbols">в—Ќвњ§*в‘…бµ•Л–в™Ўв—•</span> рџ”§
    </div>
    <a href="practica/practica.html" class="btn-practica">рџљЂ Modo PrГЎctica</a>
</div>
    <div id="config-bar" class="config-bar">

        <div style="display: flex; gap: 10px; justify-content: center;">

            <button class="btn-toggle" onclick="setAlign('center')">-= Centrado</button>

    <script>
        function toggleConfig() {
            const bar = document.getElementById('config-bar');
            bar.style.display = (bar.style.display === 'block') ? 'none' : 'block';
        }

        function setAlign(type) {
            localStorage.setItem('userTextAlign', type);
            toggleConfig();
            // Aviso discreto en consola para no interrumpir con alertas
            console.log("Preferencia guardada: " + type);
        }
    </script>

</body>
</html>
